services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macp_control_plane_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 2s
      retries: 10

  # Only started with: docker compose --profile with-runtime up
  runtime:
    image: ghcr.io/multiagentcoordinationprotocol/macp-runtime:latest
    ports:
      - '50051:50051'
    profiles:
      - with-runtime
    healthcheck:
      test: ['CMD', '/bin/grpc_health_probe', '-addr=:50051']
      interval: 5s
      timeout: 3s
      retries: 5
